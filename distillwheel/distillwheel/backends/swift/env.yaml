# venv description consumed by tools/setup_backend_envs.py
name: swift
python_version: "3.10"
venv_path: .venvs/swift
pip_packages:
  - ms-swift>=4.4,<4.5
  - transformers>=4.43
  - peft>=0.11,<0.20
  - accelerate
  - deepspeed
  - bitsandbytes
extra_pip_args: []
cuda_constraint: ">=11.8"
health_check_cmd:
  - python
  - -c
  - "import importlib.metadata as m; import swift, torch, trl; v=m.version('ms-swift'); assert v.split('.')[:2] == ['4', '4'], v; print(v, torch.__version__, trl.__version__)"
