name: verl
python_version: "3.10"
venv_path: .venvs/verl
pip_packages:
  - verl
  - ray[default]>=2.10
  - vllm>=0.6
  - pyarrow>=14.0
  - hydra-core
  - omegaconf
  - transformers>=4.43
  - torch>=2.3
extra_pip_args: []
cuda_constraint: ">=12.1"
health_check_cmd:
  - python
  - -c
  - "import verl, ray; print(verl.__version__, ray.__version__)"
