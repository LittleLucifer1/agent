name: verl
python_version: "3.10"
venv_path: .venvs/verl
pip_packages:
  - verl[vllm]==0.8.0
extra_pip_args: []
cuda_constraint: ">=12.8"
health_check_cmd:
  - python
  - -c
  - "import importlib.metadata as m; import ray, vllm, pyarrow; v=m.version('verl'); assert v == '0.8.0', v; print(v, ray.__version__, vllm.__version__, pyarrow.__version__)"
