<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paper2Video - PPT转视频</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body class="text-slate-800 min-h-screen overflow-y-auto">

<div class="max-w-7xl mx-auto px-6 py-8 pb-24">

  <!-- Step Indicator -->
  <div class="flex items-center justify-center gap-2 mb-8">
    <div class="flex items-center">
      <div class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium bg-sky-500 text-white shadow-sm">
        <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
        <span>上传 PPT</span>
      </div>
      <i data-lucide="arrow-right" class="mx-2 text-gray-300 w-4 h-4"></i>
    </div>
    <div class="flex items-center">
      <div class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-400 border border-gray-200">
        <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
        <span>语音脚本确认</span>
      </div>
      <i data-lucide="arrow-right" class="mx-2 text-gray-300 w-4 h-4"></i>
    </div>
    <div class="flex items-center">
      <div class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-400 border border-gray-200">
        <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs">3</span>
        <span>完成下载</span>
      </div>
    </div>
  </div>

  <!-- Upload Step Content -->
  <div class="max-w-6xl mx-auto">

    <!-- Title Section -->
    <div class="mb-10 text-center">
      <p class="text-xs uppercase tracking-[0.2em] text-sky-500 mb-3 font-semibold">PPT → 视频</p>
      <h1 class="text-4xl md:text-5xl font-bold mb-4 text-slate-900">PPT转视频</h1>
    </div>

    <!-- Two Column Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Left Column: Upload & Avatar -->
      <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">

        <!-- PDF Upload Section -->
        <h3 class="text-slate-800 font-medium text-sm mb-3 flex items-center gap-2">
          <span class="w-1 h-4 rounded-full bg-sky-500"></span>
          上传 PPT（必填）
        </h3>
        <div id="dropzone" class="border-2 border-dashed rounded-xl p-8 flex flex-col items-center justify-center text-center gap-4 transition-all min-h-[180px] border-gray-300 hover:border-sky-400 cursor-pointer">
          <div class="w-14 h-14 rounded-full bg-sky-50 flex items-center justify-center">
            <i data-lucide="upload-cloud" class="text-sky-500 w-7 h-7"></i>
          </div>
          <div>
            <p class="text-slate-700 font-medium mb-1">将 PPT 或 PDF 拖到此处</p>
            <p class="text-sm text-slate-400">支持 PPT、PDF</p>
          </div>
          <label class="px-5 py-2 rounded-full bg-sky-500 text-white text-sm font-medium cursor-pointer hover:bg-sky-600 transition-colors">
            选择 PPT/PDF
            <input type="file" accept=".pdf,.pptx" class="hidden" id="fileInput" />
          </label>
          <div id="selectedFileInfo" class="hidden px-4 py-2 bg-sky-50 border border-sky-200 rounded-lg">
            <p class="text-sm text-sky-600" id="selectedFileName"></p>
          </div>
        </div>

        <!-- Avatar Section -->
        <h3 class="text-slate-800 font-medium text-sm mt-6 mb-2 flex items-center gap-2">
          <span class="w-1 h-4 rounded-full bg-sky-500"></span>
          数字人 <span class="text-slate-400 text-xs font-normal">(可选)</span>
        </h3>
        <div class="flex rounded-xl bg-gray-50 border border-gray-200 p-1 gap-0">
          <button id="avatarNone" onclick="setAvatarMode('none')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all bg-white text-sky-600 border border-sky-200 shadow-sm">
            不需要数字人
          </button>
          <button id="avatarYes" onclick="setAvatarMode('yes')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-600 hover:bg-gray-100">
            需要数字人
          </button>
        </div>

        <!-- Avatar Details (hidden by default) -->
        <div id="avatarDetails" class="hidden mt-3">
          <p class="text-xs text-slate-500 mb-2">选择系统数字人或上传自己的数字人（二选一）</p>
          <p class="text-xs text-slate-400 mb-1">系统数字人</p>
          <div class="flex flex-wrap gap-3 mb-3">
            <button onclick="selectPresetAvatar('avatar1', this)" class="avatar-preset-btn rounded-xl border-2 overflow-hidden transition-all w-20 h-20 flex-shrink-0 border-gray-200 hover:border-sky-300 hover:shadow-md bg-gray-50 flex items-center justify-center">
              <span class="text-xs text-slate-400">Avatar 1</span>
            </button>
            <button onclick="selectPresetAvatar('avatar2', this)" class="avatar-preset-btn rounded-xl border-2 overflow-hidden transition-all w-20 h-20 flex-shrink-0 border-gray-200 hover:border-sky-300 hover:shadow-md bg-gray-50 flex items-center justify-center">
              <span class="text-xs text-slate-400">Avatar 2</span>
            </button>
          </div>
          <p class="text-xs text-slate-400 mb-1">上传自己的数字人</p>
          <label id="avatarUploadLabel" class="border-2 border-dashed border-gray-300 rounded-lg p-4 flex flex-col items-center justify-center text-center gap-2 cursor-pointer hover:border-sky-400 transition-all min-h-[80px]">
            <i data-lucide="image" class="text-slate-400 w-5 h-5"></i>
            <span class="text-xs text-slate-400">点击上传头像（JPG/PNG）</span>
            <input type="file" accept="image/jpeg,image/png,image/jpg" class="hidden" id="avatarInput" />
          </label>
          <div id="avatarPreviewContainer" class="hidden relative">
            <img id="avatarPreviewImg" src="" alt="Avatar" class="w-full max-h-32 object-contain rounded-lg border border-gray-200 bg-gray-50" />
            <button onclick="removeAvatar()" class="absolute top-2 right-2 p-1.5 rounded-full bg-white/80 text-slate-500 hover:bg-red-500 hover:text-white transition-colors shadow-sm">
              <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
            <p class="text-[11px] text-sky-600 mt-1" id="avatarFileName"></p>
          </div>
        </div>
      </div>

      <!-- Right Column: Configuration -->
      <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4 shadow-sm">
        <h3 class="text-slate-800 font-semibold flex items-center gap-2">
          <i data-lucide="settings-2" class="text-sky-500 w-[18px] h-[18px]"></i> 配置
        </h3>


        <!-- Script Model -->
        <div>
          <label class="block text-xs text-slate-500 mb-1 flex items-center gap-1">
            <i data-lucide="cpu" class="w-3 h-3"></i> 脚本生成模型
          </label>
          <select class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-slate-700 outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500">
            <option value="gpt-4o">GPT-4o</option>
            <option value="gpt-4o-mini">GPT-4o Mini</option>
            <option value="gpt-4.1">GPT-4.1</option>
            <option value="claude-sonnet-4">Claude Sonnet 4</option>
            <option value="claude-haiku-4">Claude Haiku 4</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="deepseek-v3">DeepSeek V3</option>
            <option value="qwen-max">Qwen Max</option>
          </select>
        </div>

        <!-- Voice Section -->
        <div>
          <div class="space-y-3">
            <!-- TTS Model -->
            <div>
              <label class="block text-xs text-slate-500 mb-1 flex items-center gap-1">
                <i data-lucide="mic" class="w-3 h-3"></i> 语音模型
              </label>
              <select class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-slate-700 outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500">
                <option value="cosyvoice-v3-flash">CosyVoice V3 Flash</option>
                <option value="cosyvoice-v3">CosyVoice V3</option>
                <option value="cosyvoice-v2">CosyVoice V2</option>
                <option value="fish-speech-1.5">Fish Speech 1.5</option>
                <option value="chattts">ChatTTS</option>
                <option value="edge-tts">Edge TTS</option>
              </select>
            </div>

            <!-- TTS Voice Selection -->
            <div>
              <label class="block text-xs text-slate-500 mb-1 flex items-center gap-1">
                <i data-lucide="mic" class="w-3 h-3"></i> 音色
              </label>
              <p class="text-xs text-slate-400 mb-2">选择预置音色试听，或在下框填入自定义 voice 参数</p>
              <div class="flex flex-wrap gap-2 mb-2" id="voiceButtons">
                <div class="flex items-center gap-0 rounded-xl overflow-hidden border-2 transition-all border-sky-500 bg-sky-50" data-voice="longanyang">
                  <button onclick="selectVoice('longanyang')" class="pl-3 pr-2 py-2.5 text-sm font-medium text-left text-slate-700 flex-1 min-w-0">
                    龙安洋
                  </button>
                  <button onclick="toggleVoicePreview('longanyang')" class="pr-2.5 py-2.5 text-sky-500 hover:text-sky-600 hover:bg-sky-100 flex-shrink-0 transition-colors" title="试听">
                    <i data-lucide="play" class="w-4 h-4" fill="currentColor"></i>
                  </button>
                </div>
                <div class="flex items-center gap-0 rounded-xl overflow-hidden border-2 transition-all border-gray-200 hover:border-sky-300 bg-white" data-voice="longanhuan">
                  <button onclick="selectVoice('longanhuan')" class="pl-3 pr-2 py-2.5 text-sm font-medium text-left text-slate-700 flex-1 min-w-0">
                    龙安欢
                  </button>
                  <button onclick="toggleVoicePreview('longanhuan')" class="pr-2.5 py-2.5 text-sky-500 hover:text-sky-600 hover:bg-sky-100 flex-shrink-0 transition-colors" title="试听">
                    <i data-lucide="play" class="w-4 h-4" fill="currentColor"></i>
                  </button>
                </div>
                <div class="flex items-center gap-0 rounded-xl overflow-hidden border-2 transition-all border-gray-200 hover:border-sky-300 bg-white" data-voice="longanwen_v3">
                  <button onclick="selectVoice('longanwen_v3')" class="pl-3 pr-2 py-2.5 text-sm font-medium text-left text-slate-700 flex-1 min-w-0">
                    龙安温
                  </button>
                  <button onclick="toggleVoicePreview('longanwen_v3')" class="pr-2.5 py-2.5 text-sky-500 hover:text-sky-600 hover:bg-sky-100 flex-shrink-0 transition-colors" title="试听">
                    <i data-lucide="play" class="w-4 h-4" fill="currentColor"></i>
                  </button>
                </div>
                <div class="flex items-center gap-0 rounded-xl overflow-hidden border-2 transition-all border-gray-200 hover:border-sky-300 bg-white" data-voice="longanzhi_v3">
                  <button onclick="selectVoice('longanzhi_v3')" class="pl-3 pr-2 py-2.5 text-sm font-medium text-left text-slate-700 flex-1 min-w-0">
                    龙安智
                  </button>
                  <button onclick="toggleVoicePreview('longanzhi_v3')" class="pr-2.5 py-2.5 text-sky-500 hover:text-sky-600 hover:bg-sky-100 flex-shrink-0 transition-colors" title="试听">
                    <i data-lucide="play" class="w-4 h-4" fill="currentColor"></i>
                  </button>
                </div>
              </div>
              <p class="text-xs text-slate-400 mb-1 flex items-center gap-1 flex-wrap">
                <span>更多的 voice 参数请参考：</span>
                <a href="https://help.aliyun.com/zh/model-studio/cosyvoice-voice-list" target="_blank" rel="noopener noreferrer" class="text-sky-500 hover:text-sky-600 inline-flex items-center gap-0.5">
                  阿里云 CosyVoice 音色列表
                  <i data-lucide="external-link" class="w-3 h-3"></i>
                </a>
              </p>
              <input
                type="text"
                id="voiceInput"
                value="longanyang"
                placeholder="如 longanyang、longanwen_v3 等"
                spellcheck="false"
                class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-slate-700 placeholder-slate-400 outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"
              />
            </div>
          </div>
        </div>

        <!-- Language -->
        <div>
          <label class="block text-xs text-slate-500 mb-1">语言</label>
          <select class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-slate-700 outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>

        <!-- Start Parse Button -->
        <button id="startBtn" onclick="handleStartParse()" disabled class="w-full py-3 rounded-lg bg-gray-200 text-gray-400 font-semibold flex items-center justify-center gap-2 transition-all cursor-not-allowed">
          <i data-lucide="arrow-right" class="w-[18px] h-[18px]"></i> 开始解析
        </button>

        <!-- Progress Bar (hidden by default) -->
        <div id="progressSection" class="hidden mt-4">
          <div class="flex justify-between text-xs text-slate-500 mb-1">
            <span id="progressStatus">正在初始化...</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-sky-500 transition-all duration-300 ease-out rounded-full" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Error Message (hidden by default) -->
    <div id="errorSection" class="hidden mt-4 flex items-center gap-2 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
      <i data-lucide="alert-circle" class="w-4 h-4"></i>
      <span id="errorMessage"></span>
    </div>
  </div>


</div>

<script>
  lucide.createIcons();

  let currentAvatarMode = 'none';
  let currentVoice = 'longanyang';
  let fileSelected = false;

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'pdf' && ext !== 'pptx') {
      showError('仅支持 PDF 或 PPTX 格式');
      return;
    }
    if (file.size > 50 * 1024 * 1024) {
      showError('文件大小超过 50MB 限制');
      return;
    }
    fileSelected = true;
    document.getElementById('selectedFileName').textContent = '✓ ' + file.name;
    document.getElementById('selectedFileInfo').classList.remove('hidden');
    hideError();
    updateStartButton();
  });

  const dropzone = document.getElementById('dropzone');
  dropzone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropzone.classList.remove('border-gray-300');
    dropzone.classList.add('border-sky-500', 'bg-sky-50');
  });
  dropzone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    dropzone.classList.add('border-gray-300');
    dropzone.classList.remove('border-sky-500', 'bg-sky-50');
  });
  dropzone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropzone.classList.add('border-gray-300');
    dropzone.classList.remove('border-sky-500', 'bg-sky-50');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'pdf' && ext !== 'pptx') {
      showError('仅支持 PDF 或 PPTX 格式');
      return;
    }
    fileSelected = true;
    document.getElementById('selectedFileName').textContent = '✓ ' + file.name;
    document.getElementById('selectedFileInfo').classList.remove('hidden');
    hideError();
    updateStartButton();
  });

  function setAvatarMode(mode) {
    currentAvatarMode = mode;
    const noneBtn = document.getElementById('avatarNone');
    const yesBtn = document.getElementById('avatarYes');
    const details = document.getElementById('avatarDetails');

    if (mode === 'none') {
      noneBtn.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all bg-white text-sky-600 border border-sky-200 shadow-sm';
      yesBtn.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-600 hover:bg-gray-100';
      details.classList.add('hidden');
    } else {
      yesBtn.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all bg-white text-sky-600 border border-sky-200 shadow-sm';
      noneBtn.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-slate-600 hover:bg-gray-100';
      details.classList.remove('hidden');
      lucide.createIcons();
    }
  }

  let selectedPreset = null;
  const AVATAR_DEFAULT_CLASS = 'avatar-preset-btn rounded-xl border-2 overflow-hidden transition-all w-20 h-20 flex-shrink-0 border-gray-200 hover:border-sky-300 hover:shadow-md bg-gray-50 flex items-center justify-center';
  const AVATAR_SELECTED_CLASS = 'avatar-preset-btn rounded-xl border-2 overflow-hidden transition-all w-20 h-20 flex-shrink-0 border-sky-500 ring-2 ring-sky-200 shadow-md scale-[1.02] bg-sky-50 flex items-center justify-center';

  function selectPresetAvatar(id, btn) {
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => { b.className = AVATAR_DEFAULT_CLASS; });
    if (selectedPreset === id) {
      selectedPreset = null;
      document.getElementById('avatarPreviewContainer').classList.add('hidden');
      document.getElementById('avatarUploadLabel').classList.remove('hidden');
      return;
    }
    selectedPreset = id;
    btn.className = AVATAR_SELECTED_CLASS;
    document.getElementById('avatarFileName').textContent = '✓ 系统数字人';
    document.getElementById('avatarPreviewImg').src = '';
    document.getElementById('avatarPreviewImg').alt = id;
    document.getElementById('avatarPreviewContainer').classList.remove('hidden');
    document.getElementById('avatarUploadLabel').classList.add('hidden');
  }

  document.getElementById('avatarInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['jpg', 'jpeg', 'png'].includes(ext)) {
      showError('头像仅支持 JPG/PNG 格式');
      return;
    }
    const url = URL.createObjectURL(file);
    document.getElementById('avatarPreviewImg').src = url;
    document.getElementById('avatarFileName').textContent = '✓ ' + file.name;
    document.getElementById('avatarPreviewContainer').classList.remove('hidden');
    document.getElementById('avatarUploadLabel').classList.add('hidden');
    selectedPreset = null;
    document.querySelectorAll('.avatar-preset-btn').forEach(b => { b.className = AVATAR_DEFAULT_CLASS; });
    hideError();
    lucide.createIcons();
  });

  function removeAvatar() {
    document.getElementById('avatarPreviewContainer').classList.add('hidden');
    document.getElementById('avatarUploadLabel').classList.remove('hidden');
    document.getElementById('avatarInput').value = '';
    selectedPreset = null;
    document.querySelectorAll('.avatar-preset-btn').forEach(b => { b.className = AVATAR_DEFAULT_CLASS; });
    lucide.createIcons();
  }

  function selectVoice(voiceId) {
    currentVoice = voiceId;
    document.getElementById('voiceInput').value = voiceId;
    document.querySelectorAll('#voiceButtons > div').forEach(div => {
      const vid = div.getAttribute('data-voice');
      if (vid === voiceId) {
        div.className = 'flex items-center gap-0 rounded-xl overflow-hidden border-2 transition-all border-sky-500 bg-sky-50';
      } else {
        div.className = 'flex items-center gap-0 rounded-xl overflow-hidden border-2 transition-all border-gray-200 hover:border-sky-300 bg-white';
      }
    });
  }

  function toggleVoicePreview(voiceId) {
    alert('试听功能需要连接后端音频资源');
  }

  function updateStartButton() {
    const btn = document.getElementById('startBtn');
    if (fileSelected) {
      btn.disabled = false;
      btn.className = 'w-full py-3 rounded-lg bg-sky-500 hover:bg-sky-600 text-white font-semibold flex items-center justify-center gap-2 transition-all cursor-pointer';
    } else {
      btn.disabled = true;
      btn.className = 'w-full py-3 rounded-lg bg-gray-200 text-gray-400 font-semibold flex items-center justify-center gap-2 transition-all cursor-not-allowed';
    }
  }

  function handleStartParse() {
    if (!fileSelected) return;
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerHTML = '<svg class="animate-spin w-[18px] h-[18px]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> 解析中...';
    btn.className = 'w-full py-3 rounded-lg bg-gray-200 text-gray-400 font-semibold flex items-center justify-center gap-2 transition-all cursor-not-allowed';

    document.getElementById('progressSection').classList.remove('hidden');
    let progress = 0;
    const statuses = ['正在初始化...', '正在解析内容...', '正在生成脚本...'];
    const interval = setInterval(() => {
      progress += Math.random() * 3 + 1;
      if (progress > 95) progress = 95;
      document.getElementById('progressBar').style.width = Math.round(progress) + '%';
      document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
      const idx = Math.min(Math.floor(progress / 30), statuses.length - 1);
      document.getElementById('progressStatus').textContent = statuses[idx];
    }, 500);

    setTimeout(() => {
      clearInterval(interval);
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressPercent').textContent = '100%';
      document.getElementById('progressStatus').textContent = '解析完成！';
      setTimeout(() => {
        alert('解析完成！在完整应用中将进入"语音脚本确认"步骤。');
        document.getElementById('progressSection').classList.add('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="arrow-right" class="w-[18px] h-[18px]"></i> 开始解析';
        btn.className = 'w-full py-3 rounded-lg bg-sky-500 hover:bg-sky-600 text-white font-semibold flex items-center justify-center gap-2 transition-all cursor-pointer';
        lucide.createIcons();
      }, 800);
    }, 5000);
  }

  function showError(msg) {
    document.getElementById('errorMessage').textContent = msg;
    document.getElementById('errorSection').classList.remove('hidden');
    lucide.createIcons();
  }

  function hideError() {
    document.getElementById('errorSection').classList.add('hidden');
  }
</script>

</body>
</html>
